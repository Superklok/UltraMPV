# --- Video Player Settings ---
loop-file=inf                           # Infinitely loop current playing video

# --- Core Performance ---
profile=gpu-hq                          # Improved scaling, color, and de-banding on modern GPUs
vo=gpu-next                             # Superior HDR-to-SDR tone mapping, better color management, and more efficient rendering
gpu-api=d3d11                           # Improves performance, better hardware acceleration, and enhances stability
hwdec=d3d11va                           # Provides direct GPU decoding with no RAM copying (zero-copy)
gpu-context=d3d11                       # Matches API for best stability

# --- Realistic HDR (The "Natural" Look) ---
target-colorspace-hint=yes              # Crucial for Windows HDR mode
tone-mapping=spline                     # Most natural roll-off for highlights
hdr-compute-peak=yes                    # Most accurate highlights and color in HDR-to-SDR conversion
# target-peak=300                       # Uncomment & set to your monitor's real nits if SDR

# --- Video Quality & Anti-Banding ---
deband=yes                              # Improves visual quality of low-bitrate content or poorly encoded videos
deband-iterations=4                     # Higher for 4K live-action clarity
deband-threshold=48                     # Stronger threshold for film grain
deband-range=16                         # Fixes compression artifacts (banding) that make smooth color transitions look blocky
deband-grain=5                          # Adds tiny film grain to prevent 'plastic' skin and mask compression artifacts
dither-depth=10                         # Explicitly tells MPV you have a 10-bit display, set to 8 for an 8-bit display
dither=fruit                            # High-quality dithering to prevent banding