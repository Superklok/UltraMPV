# --- Video Player Settings ---
loop-file=inf                           # Infinitely loop current playing video

# --- Core Performance ---
profile=gpu-hq                          # Improved scaling, color, and de-banding on modern GPUs
vo=gpu-next                             # Superior HDR-to-SDR tone mapping, better color management, and more efficient rendering
gpu-api=d3d11                           # Improves performance, better hardware acceleration, and enhances stability
hwdec=d3d11va                           # Provides direct GPU decoding with no RAM copying (zero-copy)
gpu-context=d3d11                       # Matches API for best stability

# --- Realistic HDR (The "Natural" Look) ---
target-colorspace-hint=yes              # Crucial for Windows HDR mode
tone-mapping=spline                     # Most natural roll-off for highlights
hdr-compute-peak=yes                    # Most accurate highlights and color in HDR-to-SDR conversion
# target-peak=300                       # Uncomment & set to your monitor's real nits if SDR

# --- Video Quality & Anti-Banding ---
deband=yes                              # Improves visual quality of low-bitrate content or poorly encoded videos
deband-iterations=4                     # Higher for 4K live-action clarity
deband-threshold=48                     # Stronger threshold for film grain
deband-range=16                         # Fixes compression artifacts (banding) that make smooth color transitions look blocky
deband-grain=5                          # Adds tiny film grain to prevent 'plastic' skin and mask compression artifacts
dither-depth=10                         # Explicitly tells MPV you have a 10-bit display, set to 8 for an 8-bit display
dither=fruit                            # High-quality dithering to prevent banding

# --- Motion & Smoothness ---
video-sync=display-resample             # Eliminates frame drops or repetitions (jutter) for high-quality, fluid playback
interpolation=yes                       # Ensures smoother, less "muddy" sound
tscale=oversample                       # Sharpest picture quality among the available options

# --- Scaling Fallbacks ---
scale=ewa_lanczossharp                  # Superior, high-definition sharpness when resizing lower-resolution videos
cscale=ewa_lanczossharp                 # Sharper, more defined colors and reduces blurring when upscaling
correct-downscaling=yes                 # Crucial for high-quality downscaling, resulting in a crisper, more accurate image
sigmoid-upscaling=yes                   # Minimizes "ringing" artifacts (halos) around sharp edges, for a cleaner, more natural picture
scale-antiring=0.7                      # Reduces "ringing" artifacts (halos/ghosting) around sharp edges caused by high-quality scalers like Lanczos
cscale-antiring=0.7                     # Reduces color "ringing" artifacts (halos/ghosting) around sharp edges when color information is upscaled

# --- Screenshot Settings ---
screenshot-format=png                   # Lossless compression, ensures saved image is an exact, high-fidelity, pixel-for-pixel copy of the original video frame
screenshot-high-bit-depth=yes           # Higher color precision, prevents color banding, preserves 10-bit HDR data, and avoids washed-out colors in screenshots
screenshot-directory="~/Pictures/mpv"   # Defines a specific folder (/home/user/Pictures/mpv) where MPV Player saves screenshots

# ==========================================================
# AUTO-PROFILES (Must be at the END of this file)
# ==========================================================

# --- Advanced Shaders (The Heavy Lifters) ---
# Base shader state, always keep KrigBilateral enabled for 4K color accuracy
glsl-shaders="~~/shaders/KrigBilateral.glsl"

# This profile for upscaling is to ensure shaders only run when the video is SMALLER than 4K (2160p)
[upscale-shaders]
profile-cond=width < 3840
# Appends FSRCNNX only for sub-4K content
glsl-shaders-append="~~/shaders/FSRCNNX_x2_16-0-4-1.glsl"

# This profile runs if video is 4K, but screen is smaller (e.g., 1080p or 1440p monitor)
[downscale-shaders]
profile-cond=width >= 3840 and screen_res_y < 2160
glsl-shaders-append="~~/shaders/SSimDownscaler.glsl"

# This profile runs for native 4K content to maximize performance, so GPU power is not wasted on upscalers/downscalers
[clearing-profile]
profile-cond=width >= 3840 and screen_res_y >= 2160
glsl-shaders="~~/shaders/KrigBilateral.glsl"

# This profile fixes stuttering on 60fps content and prevents MPV from trying to "smooth" video that is already perfectly synced to your screen
[60fps-fix]
profile-cond=container_fps > 59
interpolation=no # Disables interpolation when the video matches the monitor Hz